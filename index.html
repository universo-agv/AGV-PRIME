<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGV PRIME - Simulação Oficial</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body, html { height: 100%; margin: 0; }

        .bg {
            width: 100%;
            min-height: 100vh;
            /* Fundo com a imagem dos carros e camada azul escura */
            background: linear-gradient(rgba(11, 31, 58, 0.8), rgba(11, 31, 58, 0.8)), url('carros.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 380px;
            background: rgba(11, 31, 58, 0.95); 
            border: 1px solid rgba(212, 175, 55, 0.5);
            border-radius: 24px;
            padding: 40px 30px;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        /* ESTILO DO NOVO LOGO SVG (TRANSPARENTE) */
        .logo-container {
            width: 200px;
            margin: 0 auto 20px auto;
        }
        .logo-container svg {
            width: 100%;
            height: auto;
        }

        h1 { color: #ffffff; font-size: 24px; font-weight: 900; margin-bottom: 10px; text-transform: uppercase; }

        .subtitle { color: #cbd5e1; font-size: 15px; margin-bottom: 30px; line-height: 1.4; }
        .subtitle span { color: #d4af37; font-weight: bold; }

        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { color: #ffffff; font-size: 12px; font-weight: 700; margin-bottom: 8px; display: block; text-transform: uppercase; letter-spacing: 1px; }

        .input-group input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus { border-color: #d4af37; background: rgba(255, 255, 255, 0.1); }

        button {
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
            color: #0b1f3a;
            font-weight: 900;
            font-size: 16px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(212, 175, 55, 0.4); }

        #msg { margin-top: 20px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="bg">
    <div class="container">
        <!-- LOGO PROFISSIONAL EM VETOR (SVG) -->
        <div class="logo-container">
            <svg viewBox="0 0 400 130" xmlns="http://www.w3.org/2000/svg">
                <!-- Ícone AGV -->
                <path d="M60 25 L110 65 L60 105 L10 65 Z" fill="#ffffff" />
                <path d="M25 65 Q60 25 95 65" stroke="#d4af37" stroke-width="8" fill="none" />
                <!-- Texto -->
                <text x="130" y="45" font-family="Arial" font-weight="bold" font-size="28" fill="#ffffff">UNIVERSO</text>
                <text x="130" y="105" font-family="Arial" font-weight="900" font-size="80" fill="#ffffff">AGV</text>
            </svg>
        </div>

        <h1>Simulação Digital</h1>
        <p class="subtitle">Receba agora sua cotação na nossa <span>base oficial</span>.</p>

        <form id="form">
            <div class="input-group">
                <label>Nome Completo</label>
                <input type="text" id="nome" placeholder="Digite seu nome" required>
            </div>

            <div class="input-group">
                <label>WhatsApp</label>
                <input type="text" id="telefone" placeholder="(00) 00000-0000" required>
            </div>

            <div class="input-group">
                <label>Placa do Veículo</label>
                <input type="text" id="placa" placeholder="ABC-1234" required>
            </div>

            <button type="submit" id="btn-submit">Pedir cotação</button>
            <p id="msg"></p>
        </form>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
